<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Multiple User Signup</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-shell">
        <div class="auth-card welcome-card">
            <div class="brand-badge">Welcome</div>
            <h1 id="welcome-title">Hello!</h1>
            <p class="subtext" id="welcome-message">Thanks for signing up.</p>

            <div class="welcome-actions">
                <button class="primary-btn" type="button" onclick="logout()">Logout</button>
                <a class="secondary-link" href="index.html">Back to Signup</a>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
